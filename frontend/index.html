<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!--
    viewport-fit=cover: lets content extend into iPhone notch / Dynamic Island area.
    CSS then uses env(safe-area-inset-*) to add padding so content isn't hidden.
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- Mobile browser chrome color (Android Chrome / Samsung Internet) -->
  <meta name="theme-color" content="#1976d2" />

  <!-- iOS standalone / home-screen web app hints -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Customer Form" />

  <title>Customer Data Collection</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Customer Data Collection RONEN</h1>

    <form id="customerForm" novalidate>
      <div class="form-group">
        <label for="customerId">Customer ID <span aria-hidden="true" style="color:red">*</span></label>
        <input
          type="text"
          id="customerId"
          placeholder="e.g. CUST001"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="characters"
          required
        />
      </div>

      <div class="form-group">
        <label for="customerName">Customer Name <span aria-hidden="true" style="color:red">*</span></label>
        <input
          type="text"
          id="customerName"
          placeholder="Full name"
          autocomplete="name"
          autocapitalize="words"
          required
        />
      </div>

      <div class="form-group">
        <label for="gender">Gender <span aria-hidden="true" style="color:red">*</span></label>
        <select id="gender" required>
          <option value="">-- Select Gender --</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label for="age">Age <span aria-hidden="true" style="color:red">*</span></label>
        <!-- inputmode="numeric" shows number pad on mobile without spinner arrows -->
        <input
          type="number"
          id="age"
          placeholder="e.g. 25"
          min="0"
          max="150"
          inputmode="numeric"
          required
        />
      </div>

      <div class="form-group">
        <label for="someNumber">Some Number <span aria-hidden="true" style="color:red">*</span></label>
        <input
          type="number"
          id="someNumber"
          placeholder="e.g. 10"
          inputmode="numeric"
          required
        />
      </div>

      <button type="submit">Submit</button>

      <div id="message" role="alert" aria-live="polite"></div>
    </form>

    <div style="text-align:center; margin-top:20px;">
      <a href="admin.html" style="
        display:inline-block;
        padding:10px 24px;
        background:#fff;
        color:#1976d2;
        border:2px solid #1976d2;
        border-radius:4px;
        text-decoration:none;
        font-size:0.9rem;
        font-weight:bold;
        touch-action:manipulation;
        transition:background-color 0.2s, color 0.2s;
      "
      onmouseover="this.style.background='#1976d2';this.style.color='#fff';"
      onmouseout="this.style.background='#fff';this.style.color='#1976d2';"
      >Admin Panel</a>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
