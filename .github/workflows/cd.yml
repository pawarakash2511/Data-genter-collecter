name: CD — Deploy to AWS EC2

on:
  workflow_run:
    workflows: ["CI — Test, Build & Push Docker Images"]
    types:
      - completed

jobs:
  deploy:
    name: Deploy on EC2
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ec2-user/Data-genter-collecter

            # Pull latest code (docker-compose.yml etc.)
            git pull origin main

            # Write .env from GitHub Secret (idempotent — safe to run every deploy)
            echo "${{ secrets.ENV_FILE }}" > .env

            # Pull latest images from Docker Hub
            docker pull pawarakash2511/customer-api:latest
            docker pull pawarakash2511/customer-ui:latest

            # Restart services with new images
            docker compose down
            docker compose up -d

            echo "Deployment complete — $(date)"
