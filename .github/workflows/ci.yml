name: CI — Test, Build & Push Docker Images

on:
  workflow_dispatch:  # manual trigger only

jobs:
  # ── Job 1: Run backend unit tests ──────────────────────────
  test:
    name: Run Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run pytest
        run: |
          cd backend
          pytest tests/ -v --tb=short

  # ── Job 2: Build & push Docker images (only if tests pass) ─
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          # Every trigger gets a unique SHA tag + latest always points to newest
          tags: |
            pawarakash2511/customer-api:${{ github.sha }}
            pawarakash2511/customer-api:latest

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            pawarakash2511/customer-ui:${{ github.sha }}
            pawarakash2511/customer-ui:latest
